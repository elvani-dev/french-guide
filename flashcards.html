<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>French Flashcards — Niveau 3</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="French Cards">
<meta name="theme-color" content="#1e1b4b">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
 :root{--bg:#0f172a;--card:#1e293b;--accent:#6366f1;--accent2:#22d3ee;--text:#e2e8f0;--muted:#94a3b8;--good:#22c55e;}
 *{box-sizing:border-box;}
 body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(160deg,#0f172a,#1e1b4b);color:var(--text);min-height:100vh;}
 .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px;}
 h1{font-size:22px;margin:0 0 4px;}
 .sub{color:var(--muted);font-size:14px;margin-bottom:18px;}
 .controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:center;}
 select,button{font-size:14px;border-radius:10px;border:1px solid #334155;background:var(--card);color:var(--text);padding:9px 12px;cursor:pointer;}
 select:focus,button:focus{outline:2px solid var(--accent);}
 button:hover{border-color:var(--accent);}
 .pill{background:var(--accent);border:none;font-weight:600;}
 .pill.alt{background:transparent;border:1px solid var(--accent2);color:var(--accent2);}
 .card{background:var(--card);border-radius:20px;padding:48px 28px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;box-shadow:0 20px 40px rgba(0,0,0,.35);position:relative;transition:transform .15s;user-select:none;}
 .card:active{transform:scale(.99);}
 .face{font-size:30px;font-weight:600;line-height:1.35;}
 .hint{position:absolute;top:14px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
 .tag{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px;}
 .flipnote{margin-top:18px;color:var(--muted);font-size:12px;}
 .nav{display:flex;gap:10px;margin-top:18px;justify-content:center;align-items:center;}
 .nav button{min-width:64px;}
 .count{color:var(--muted);font-size:13px;min-width:90px;text-align:center;}
 .bigbtn{flex:1;padding:13px;font-size:15px;}
 .again{border-color:#f59e0b;color:#f59e0b;}
 .know{border-color:var(--good);color:var(--good);}
 .bar{height:6px;background:#334155;border-radius:6px;overflow:hidden;margin:14px 0 4px;}
 .bar > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s;}
 footer{margin-top:26px;color:var(--muted);font-size:12px;text-align:center;}
 kbd{background:#334155;border-radius:5px;padding:1px 6px;font-size:11px;}
</style>
</head>
<body>
<div class="wrap">

 <h1>🇫🇷 French Flashcards — Niveau 3</h1>
 <div class="sub" id="sub">Loading…</div>

   <option value="Vocabulary">Vocabulary</option>
   <option value="Phrases">Phrases</option>
   <option value="Sentences">Sentences</option>
  </select>
  <select id="dir">
   <option value="fr">French → English</option>
   <option value="en">English → French</option>
  </select>
  <button class="pill" id="shuffle">🔀 Shuffle</button>
  <button class="pill alt" id="reset">Reset progress</button>
 </div>
 <div class="bar"><div id="barfill"></div></div>
 <div class="count" id="progress" style="text-align:left"></div>
 <div class="card" id="card" onclick="flip()">
   <div class="hint" id="hint"></div>
   <div class="face" id="face">—</div>
   <div class="tag" id="tag"></div>
 </div>
 <div class="flipnote">Tap the card or press <kbd>Space</kbd> to flip · <kbd>←</kbd>/<kbd>→</kbd> to navigate</div>
 <div class="nav">
  <button id="prev">‹ Prev</button>
  <span class="count" id="count"></span>
  <button id="next">Next ›</button>
 </div>
 <div class="nav">
  <button class="bigbtn again" id="markagain">↻ Practice again</button>
  <button class="bigbtn know" id="markknow">✓ I know this</button>
 </div>
 <footer><span id="cardcount"></span> ⭐ Grammar deck + your lesson vocabulary &amp; phrases. Progress is saved in this browser.</footer>
</div>

Y & EN", "cat": "Vocabulary"}, {"fr": "urgent(e)", "en": "urgent", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Vocabulary"}, {"fr": "Je m'intéresse à la danse contemporaine. → Je m'y intéresse.", "en": "I'm interested in contemporary dance. → I'm interested in it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Phrases"}, {"fr": "Quand j'ai des doutes, je me fie à mon instinct.", "en": "When I have doubts, I rely on my instinct.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Phrases"}, {"fr": "Les Suisses tiennent beaucoup à leur neutralité.", "en": "The Swiss care a lot about their neutrality.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Phrases"}, {"fr": "À la plage, on doit faire attention aux coups de soleil.", "en": "At the beach, you have to watch out for sunburn.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Phrases"}, {"fr": "Elle vient de déménager. Elle s'habitue à sa nouvelle vie. → Elle s'y habitue.", "en": "She has just moved. She is getting used to her new life. → She is getting used to it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Phrases"}, {"fr": "Ce parti politique s'oppose aux nouvelles réformes. → Ce parti politique s'y oppose.", "en": "This political party opposes the new reforms. → This party opposes them.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Phrases"}, {"fr": "Je pense à mon travail. → J'y pense.", "en": "I think about my work. → I think about it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Je dois penser à mon travail. → Je dois y penser.", "en": "I have to think about my work. → I have to think about it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Je veux partir à Paris. → Je veux y partir.", "en": "I want to go to Paris. → I want to go there.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Je pense à mon travail. → J'y ai pensé.", "en": "I thought about my work. → I thought about it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Je pense à ma mère. (✗ Je lui pense / ✔ Je pense à elle.)", "en": "I think about my mother. → I think about her.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Est-ce que tu penses souvent à ta mère ? → Oui, je pense souvent à elle.", "en": "Do you often think about your mother? → Yes, I think about her often.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Je/J' me souviens très clairement de mon enfance. → Je m'en souviens très clairement.", "en": "I remember my childhood very clearly. → I remember it very clearly.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Nous sommes fiers de notre patrimoine culturel. → Nous en sommes fiers.", "en": "We are proud of our cultural heritage. → We are proud of it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "On a envie de faire le tour du monde. → On en a envie.", "en": "We feel like traveling around the world. → We feel like it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "J'ai besoin de ton aide ; c'est urgent ! → J'en ai besoin.", "en": "I need your help; it's urgent! → I need it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "Mon banquier s'occupe de mon portefeuille. → Mon banquier s'en occupe.", "en": "My banker takes care of my portfolio. → My banker takes care of it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "J'ai entendu parler de ce film ; un ami me l'a recommandé. → J'en ai entendu parler.", "en": "I heard about this film; a friend recommended it to me. → I heard about it.", "lesson": "2026-02-06", "theme": "Pronouns Y & EN", "cat": "Sentences"}, {"fr": "déjà", "en": "already", "lesson": "2026-02-27", "the : "Sentences"}, {"fr": "Quand il est arrivé à l'auberge, le film avait déjà commencé.", "en": "When he arrived at the hostel, the film had already started.", "lesson": "2026-02-27", "theme": "Plus-que-parfait", "cat": "Sentences"}, {"fr": "Quand il a déménagé à L.A., il n'avait jamais encore passé un examen.", "en": "When he moved to L.A., he had never taken an exam yet.", "lesson": "2026-02-27", "theme": "Plus-que-parfait", "cat": "Sentences"}, {"fr": "Elle n'avait pas encore réussi son examen.", "en": "She had not yet passed her exam.", "lesson": "2026-02-27", "theme": "Plus-que-parfait", "cat": "Sentences"}, {"fr": "Nous nous étions inscrits avant le début du cours.", "en": "We had signed up before the start of the course.", "lesson": "2026-02-27", "theme": "Plus-que-parfait", "cat": "Sentences"}, {"fr": "Avant son départ, ils avaient (déjà) fait leurs bagages.", "en": "Before her/his departure, they had (already) packed.", "lesson": "2026-02-27", "theme": "Plus-que-parfait", "cat": "Sentences"}, {"fr": "rentrer", "en": "to come/go back home", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "oublier", "en": "to forget", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "une chambre d'hôtel (f.)", "en": "a hotel room", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "réserver", "en": "to reserve / book", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "complet / complète", "en": "full (no vacancy)", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "une auberge (f.)", "en": "an inn / hostel", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "tomber", "en": "to fall", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "un rôle (m.)", "en": "a role", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "mouillé(e)", "en": "wet / soaked", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "attendre", "en": "to wait for", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "accompagner", "en": "to accompany", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "un collègue / une collègue", "en": "a colleague", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "le dernier métro (m.)", "en": "the last subway", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "regarder", "en": "to watch / look at", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "une plante verte (f.)", "en": "a houseplant", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "un voisin / une voisine", "en": "a neighbor", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "arroser", "en": "to water (plants)", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "un serrurier (m.)", "en": "a locksmith", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "appeler", "en": "to call", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Vocabulary"}, {"fr": "Je courais / J'ai couru pendant une heure.", "en": "I was running / I ran for an hour.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Phrases"}, {"fr": "Il a plu pendant la soirée.", "en": "It rained during the evening.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Phrases"}, {"fr": "Il pleuvait hier ; il avait plu toute la nuit.", "en": "It was raining yesterday; it had rained all night.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Phrases"}, {"fr": "Je me suis levé et je suis allé au travail.", "en": "I got up and went to work.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Phrases"}, {"fr": "avoir envie de", "en": "to want / to feel like (something)", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Phrases"}, {"fr": "Nous sommes rentrés.", "en": "We came back / went home.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Phrases"}, {"fr": "Ils nous ont attendus.", "en": "They waited for us.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Phrases"}, {"fr": "Quand le maman de Ludovic est rentrée, il jouait.", "en": "When Ludovic's mum came back home, he was playing.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "Il avait oublié de réserver une chambre d'hôtel. Quand il est parti, l'auberge était complète.", "en": "He had forgotten to reserve a hotel room. When he left, the inn was full.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "Nous avions réservé... / nous étions allés...", "en": "We had reserved... / we had gone...", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "Elle s'était tombée en faisant du rôle.", "en": "She had fallen while doing her role.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "Nous sommes rentrés ; nous étions complètement mouillés.", "en": "We came back home; we were completely soaked.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "Hier soir, je l'ai accompagné(e) ; nous avons pris le dernier métro.", "en": "Last night I went with him/her; we took the last subway.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "Ma copine voulait regarder un film.", "en": "My girlfriend wanted to watch a film.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "Quand Lou et Mathieu sont partis en voyage, leur voisin a arrosé toutes leurs plantes vertes.", "en": "When Lou and Mathieu went away on a trip, their neighbor watered all their houseplants.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "La porte était bloquée, alors j'ai dû appeler un serrurier.", "en": "The door was stuck, so I had to call a locksmith.", "lesson": "2026-03-09", "theme": "Past narration (3 tenses)", "cat": "Sentences"}, {"fr": "à cause de", "en": "because of", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "grâce à", "en": "thanks to / because of (praise)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "parce que", "en": "because", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "avec", "en": "with", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "passer (qqch)", "en": "to pass / hand (something)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "se plaindre", "en": "to complain", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "la nouvelle série", "en": "the new series", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "rejoindre", "en": "to join / meet up with", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "la mer (f.)", "en": "the sea", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "le champagne (m.)", "en": "champagne", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "apporter", "en": "to bring", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "la route (f.)", "en": "the road / route", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "les gens (m. pl.)", "en": "people", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "téléphoner à", "en": "to phone / call (someone)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "envoyer", "en": "to send", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "conseiller à", "en": "to advise (someone)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "demander la permission", "en": "to ask permission", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "interdire à", "en": "to forbid (someone)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "dormir", "en": "to sleep", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "une histoire (f.)", "en": "a story", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "un/une collègue", "en": "a colleague", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "rendre visite à", "en": "to visit (a person)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "le cadeau (m.)", "en": "the gift", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "le sel (m.)", "en": "the salt", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "présenter", "en": "to introduce / present", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "parler à", "en": "to speak to", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "écrire à", "en": "to write to", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "penser à", "en": "to think about", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "s'intéresser à", "en": "to be interested in", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Vocabulary"}, {"fr": "à cause de moi", "en": "because of me", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "grâce à lui", "en": "thanks to him", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Est-ce que tu connais Laurence ? — Oui, je la connais.", "en": "Do you know Laurence? — Yes, I know her.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Est-ce que tu regardes la télé le soir ? — Oui, je la regarde.", "en": "Do you watch TV in the evening? — Yes, I watch it.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Je téléphone à mon père. → Je lui téléphone.", "en": "I phone my dad. → I phone him.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Je lui ai demandé la permission.", "en": "I asked him/her for permission.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Je veux leur demander la permission.", "en": "I want to ask them for permission.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Je te l'ai donné.", "en": "I gave it to you.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Je le lui ai donné.", "en": "I gave it to him/her.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Phrases"}, {"fr": "Did you think you could go without me?", "en": "(translate using a tonic pronoun: …sans moi.)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "I almost (presque) forgot to stop (passer) by yours.", "en": "(…chez toi.)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "She took care of us every day and she never complained (se plaindre).", "en": "(…de nous… ne s'est jamais plainte.)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "It's Marie and Hélène's birthday; I found the perfect gift for them.", "en": "(…pour elles.)", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce que tu regardes la nouvelle série sur Netflix ? — Oui, je la regarde.", "en": "Do you watch the new series on Netflix? — Yes, I watch it.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce que tu rejoins tes amis plus tard ? — Oui, je les rejoins.", "en": "Are you meeting your friends later? — Yes, I'm meeting them.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce que tu entends la mer depuis chez toi ? — Oui, je l'entends.", "en": "Can you hear the sea from your place? — Yes, I hear it.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce que Charlotte apporte le champagne ce soir ? — Oui, elle l'apporte.", "en": "Is Charlotte bringing the champagne tonight? — Yes, she's bringing it.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce que tu connais ces gens ? — Oui, …", "en": "Do you know these people? — Yes, …", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce que tu téléphones souvent à ton père ? — Oui, je lui téléphone souvent.", "en": "Do you often call your father? — Yes, I call him often.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce que tu envoies des cartes postales à tes amis ? — Oui, je leur envoie des cartes postales.", "en": "Do you send postcards to your friends? — Yes, I send them postcards.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Docteur, est-ce que vous conseillez à Stéphane de rester chez lui ? — Oui, je lui conseille de rester chez lui.", "en": "Doctor, do you advise Stéphane to stay home? — Yes, I advise him to stay home.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Est-ce qu'ils demandent la permission à leurs parents avant de sortir ? — Oui, ils leur demandent la permission.", "en": "Do they ask their parents for permission before going out? — Yes, they ask them for permission.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "Tu as donné son cadeau à Sophie ? — Oui, je le lui ai donné.", "en": "Did you give Sophie her gift? — Yes, I gave it to her.", "lesson": "2026-03-13", "theme": "Object & tonic pronouns", "cat": "Sentences"}, {"fr": "le futur simple (m.)", "en": "the simple future", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "l'infinitif (m.)", "en": "the infinitive", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "la terminaison (f.)", "en": "the ending", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "le verbe (m.)", "en": "the verb", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "chercher", "en": "to look for", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "un nouveau travail (m.)", "en": "a new job", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "riche", "en": "rich", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "un croissant (m.)", "en": "a croissant", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "un château (m.)", "en": "a castle", "lesson": "2026-03-27", "theme": "Futur simple", "cat": "Vocabulary"}, {"fr": "faire du ski", "e  "In case you want to eat, there'd be food in the fridge.", "lesson": "2026-05-01", "theme": "Hypothèses sur le présent", "cat": "Sentences"}, {"fr": "Au cas où tu aurais soif, tu peux boire de l'eau.", "en": "In case you're thirsty, you can drink water.", "lesson": "2026-05-01", "theme": "Hypothèses sur le présent", "cat": "Sentences"}, {"fr": "Si tu viens demain, on mangera des pizzas.", "en": "If you come tomorrow, we'll eat pizza.", "lesson": "2026-05-01", "theme": "Hypothèses sur le présent", "cat": "Sentences"}, {"fr": "Si tu venais maintenant, on mangerait des pizzas.", "en": "If you came now, we'd eat pizza.", "lesson": "2026-05-01", "theme": "Hypothèses sur le présent", "cat": "Sentences"}, {"fr": "le conditionnel passé", "en": "the past conditional", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "un temps composé", "en": "a compound tense", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "le passé composé", "en": "the compound past (perfect)", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "le plus-que-parfait", "en": "the pluperfect", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "l'auxiliaire (m.)", "en": "the auxiliary / helping verb", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "partir", "en": "to leave / depart", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "pouvoir", "en": "to be able to / can", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "devoir", "en": "to have to / must", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "oser", "en": "to dare", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "la fuite", "en": "the leak", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "chic", "en": "fancy / chic", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "exténué", "en": "exhausted", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "la grasse matinée", "en": "a sleep-in / lie-in", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "de toute façon", "en": "anyway / in any case", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "un coup de soleil", "en": "a sunburn", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "la crème solaire", "en": "sunscreen", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "une couverture", "en": "a blanket", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "végétarien / végétarienne", "en": "vegetarian", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "un regret", "en": "a regret", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "un remords", "en": "remorse", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "un reproche", "en": "a reproach", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "sinon", "en": "otherwise / if not", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "le spa", "en": "the spa", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "beaucoup de gens vieux", "en": "many old people", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "beaucoup de personnes vieilles", "en": "many old people", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "des gens âgés / des personnes âgées", "en": "elderly people", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Vocabulary"}, {"fr": "d'un cert es"}, {"fr": "Exprimez un regret en utilisant un verbe au conditionnel passé !", "en": "Express a regret using a verb in the past conditional!", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Phrases"}, {"fr": "On utilise le conditionnel passé pour exprimer des regrets / des remords / des reproches", "en": "We use the past conditional to express regrets / remorse / reproaches", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Phrases"}, {"fr": "On utilise le conditionnel passé après 'sinon'", "en": "We use the past conditional after 'sinon' (otherwise)", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Phrases"}, {"fr": "De toute façon, je n'aurais pas pu venir au mariage de Philippe.", "en": "Anyway, I couldn't have come to Philippe's wedding.", "lesson": "2026-05-08", "theme": "Conditionnel passé", "cat": "Phrases"}, {"fr": "prévenir", "en": "to warn", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "éviter", "en": "to dodge / to avoid", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "manquer", "en": "to miss", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "avoir froid", "en": "to be (feel) cold", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "être trempé", "en": "to be soaked", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "être mouillé", "en": "to be wet (damp)", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "il nous pleut dessus / la pluie nous tombe dessus", "en": "it's raining on us", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "ne... que", "en": "only", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "messy (désordonné)", "en": "messy / untidy", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "végétarien (m.)", "en": "vegetarian", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "un parapluie", "en": "an umbrella", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "une ratatouille", "en": "ratatouille (dish)", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "un cauchemar (m.)", "en": "a nightmare", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "Tu me manques.", "en": "I miss you.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "Elle te manque.", "en": "You're missing her.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "Ma famille me manque. Ils me manquent.", "en": "I miss my family. I miss them.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "Je mange que de la viande.", "en": "I only eat meat. (ne... que = only)", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "Il nous pleut dessus.", "en": "It's raining on us.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "La pluie nous tombe dessus.", "en": "The rain is falling on us.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "Heureusement que tu m'as prévenu, sinon je serais tombée.", "en": "Good thing you warned me, otherwise I would have fallen.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement que le chauffeur a évité mon chien, sinon il serait mort / il aurait été tué.", "en": "Good thing the driver dodged my dog, otherwise it would have died / been killed.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement que Pia est arrivée à l'heure à l'aéroport, sinon elle aurait manqué son vol / avion.", "en": "Good thing Pia arrived on time at the airport, otherwise she would have missed her flight / plane.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement que mes parents ne restent qu'une semaine à New York, sinon je ne serais pas allé(e) à la fête.", "en": "Good thing my parents are only staying a week in New York, otherwise I wouldn't have gone to the party.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement que mon coloc n'est pas désordonné, sinon on n'aurait pas fini notre travail.", "en": "Good thing my roommate isn't messy, otherwise we wouldn't have finished our work.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement que nos voisins ne sont pas là ce soir, sinon ils n'auraient pas été contents avec le bruit / ils auraient été mécontents à cause du bruit.", "en": "Good thing our neighbors aren't here tonight, otherwise they wouldn't have been happy with the noise / would have been unhappy because of the noise.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement que Michel n'est pas végétarien, sinon il n'aurait pas mangé de viande / il aurait mangé beaucoup de légumes.", "en": "Good thing Michel isn't vegetarian, otherwise he wouldn't have eaten meat / he would have eaten a lot of vegetables.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement qu'on a pensé à prendre un parapluie, sinon on aurait été trempés.", "en": "Good thing we thought to take an umbrella, otherwise we would have been soaked.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Heureusement que Laure a réservé une chambre d'hôtel à l'avance, sinon on aurait dormi dans la rue / on aurait dormi dehors / on aurait dû dormir dans la rue.", "en": "Good thing Laure booked a hotel room in advance, otherwise we would have slept in the street / outside / would have had to sleep in the street.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "S'il avait accident sur la route, donc je suis arrivé(e) en retard. (S'il n'y avait pas eu d'accident sur la route, je serais arrivé(e) à l'heure.)", "en": "Had there not been an accident on the road, I would have arrived on time.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "S'il avait fait beau, on serait allé(e)s à la plage.", "en": "If it had been nice, we would have gone to the beach.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Si j'avais pu, j'aurais aimé aller à Harvard.", "en": "If I had been able to, I would have liked to go to Harvard.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "Elle aurait cuisiné une ratatouille.", "en": "She would have cooked a ratatouille.", "lesson": "2026-05-22", "theme": "Hypothèses sur le passé", "cat": "Sentences"}, {"fr": "se ficher de / s'en ficher", "en": "to not care about", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "se moquer de", "en": "to make fun of / not care", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "une déclaration d'impôts (f.)", "en": "a tax return / tax declaration", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "des pénalités de retard (f.)", "en": "late penalties", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "à temps", "en": "in time / on time", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "perdre ses clefs (clés)", "en": "to lose one's keys", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "rentrer dans son appartement", "en": "to get back into one's apartment", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "de mauvaise humeur", "en": "in a bad mood", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "se coucher tard", "en": "to go to bed late", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "jouer au poker", "en": "to play poker", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "gagner de l'argent", "en": "to win / earn money", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "un week-end (m.)", "en": "a weekend", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "en vacances", "en": "on vacation", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "une cousine (f.)", "en": "a (female) cousin", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "regarder un film", "en": "to watch a movie", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "avoir mal à la tête", "en": "to have a headache", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "du vent (m.)", "en": "wind", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "un cerf-volant (m.)", "en": "a kite", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "une ratatouille (f.)", "en": "ratatouille", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "je me douche / je me suis douché(e)", "en": "I shower / I showered", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Vocabulary"}, {"fr": "Je me douche. / Je me suis douché(e).", "en": "I shower. / I showered. (pronominal)", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "Charlie et Pia ne se sont pas occupés de leur déclaration d'impôts à temps.", "en": "Charlie and Pia didn't deal with their tax return in time.", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "Elle s'étaient occupées de leur déclaration d'impôts à temps.", "en": "They had handled their tax return on time.", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Phrases"}, {"fr": "J'aurais / je serais ...", "en": "I would have ... (avoir vs être auxiliary)", "lesson": "2026-06-12", "theme": "Hypothèses sur le passé", "cat": "Phrases"}];
let deck=[], idx=0, flipped=false;
let known = load();
function load(){try{return JSON.parse(localStorage.getItem("fr_known")||"{}")}catch(e){return {}}}
function save(){try{localStorage.setItem("fr_known",JSON.stringify(known))}catch(e){}}
function cardId(c){return c.fr+"|"+c.en;}

let themes=[...new Set(ALL.map(c=>c.theme))];
// grammar themes (★) first, then everything else alphabetically
themes.sort((a,b)=>{const ga=a.startsWith("⭐"),gb=b.startsWith("⭐");if(ga!==gb)return ga?-1:1;return a.localeCompare(b);});
const tsel=document.getElementById("theme");
const nGram=ALL.filter(c=>c.cat==="Grammar").length;
tsel.innerHTML=
  '<option value="__grammar__">⭐ Grammar &amp; formulas — all ('+nGram+')</option>'+
  '<option value="all">All topics ('+ALL.length+')</option>'+
  themes.map(t=>{const n=ALL.filter(c=>c.theme===t).length;return '<option value="'+t+'">'+t+' ('+n+')</option>';}).join("");
tsel.value="__grammar__";  // grammar is the main goal → default to it
document.getElementById("cardcount").textContent=ALL.length+" cards ·";

function build(){
  const th=tsel.value, ct=document.getElementById("cat").value;
  if(th==="__grammar__"){ deck=ALL.filter(c=>c.cat==="Grammar"); }
  else { deck=ALL.filter(c=>(th==="all"||c.theme===th)&&(ct==="all"||c.cat===ct)); }
  idx=0;flipped=false;render();
}
function shuffle(){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;flipped=false;render();}
function flip(){flipped=!flipped;render();}
function go(d){idx=(idx+d+deck.length)%deck.length;flipped=false;render();}
function render(){
  const dir=document.getElementById("dir").value;
  document.getElementById("sub").textContent="Quick practice — pick a topic and flip through. Aim for 2 short sessions a week.";
  if(!deck.length){document.getElementById("face").textContent="No cards";return;}
  const c=deck[idx];
  const front = dir==="fr"?c.fr:c.en;
  const back  = dir==="fr"?c.en:c.fr;
  document.getElementById("face").textContent=flipped?back:front;
  document.getElementById("hint").textContent=flipped?(dir==="fr"?"English":"Français"):(dir==="fr"?"Français":"English");
  document.getElementById("tag").textContent=c.theme+" · "+c.cat+(known[cardId(c)]?" · ✓ known":"");
  document.getElementById("count").textContent=(idx+1)+" / "+deck.length;
  const kn=deck.filter(c=>known[cardId(c)]).length;
  document.getElementById("progress").textContent=kn+" of "+deck.length+" marked known";
  document.getElementById("barfill").style.width=(100*kn/deck.length)+"%";
}
document.getElementById("next").onclick=()=>go(1);
document.getElementById("prev").onclick=()=>go(-1);
document.getElementById("shuffle").onclick=shuffle;
document.getElementById("theme").onchange=build;
document.getElementById("cat").onchange=build;
document.getElementById("dir").onchange=render;
document.getElementById("markknow").onclick=()=>{known[cardId(deck[idx])]=1;save();go(1);};
document.getElementById("markagain").onclick=()=>{delete known[cardId(deck[idx])];save();go(1);};
document.getElementById("reset").onclick=()=>{if(confirm("Clear all known marks?")){known={};save();render();}};
document.addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();flip();}else if(e.code==="ArrowRight")go(1);else if(e.code==="ArrowLeft")go(-1);});
build();
</script>
</body>
</html>
